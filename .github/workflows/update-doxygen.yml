name: Doxygen

on:
  push:
    branches: [ master ]
    paths:
      - 'src/**'
      - 'docs/**'
      - 'README.md'
      - '.github/Doxyfile'
      - '.github/workflows/update-doxygen.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'src/**'
      - 'docs/**'
      - 'README.md'
      - '.github/Doxyfile'
      - '.github/workflows/update-doxygen.yml'
  workflow_dispatch:

jobs:
  build-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Doxygen and Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Set project version
        run: |
          ver="${GITHUB_REF_NAME} (${GITHUB_SHA::7})"
          sed -i "s|^PROJECT_NUMBER.*|PROJECT_NUMBER         = ${ver}|" .github/Doxyfile
      
      - name: Ensure build/docs directory exists
        run: mkdir -p build/docs/doxygen

      - name: Build documentation
        run: doxygen .github/Doxyfile

      - name: Verify HTML output exists
        run: test -d build/docs/doxygen/html

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-html
          path: build/docs/doxygen/html

  deploy-pages:
    if: ${{ github.event_name == 'push' }}
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Download docs artifact
        uses: actions/download-artifact@v4
        with:
          name: doxygen-html
          path: build/docs/doxygen/html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/docs/doxygen/html

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
